{% extends "base.html" %}
{% block title %}Client — Velo{% endblock %}
{% block page_title %}{{ "Edit" if client else "New" }} Client{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('clients') }}" class="btn btn-outline">← Back</a>{% endblock %}
{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-group"><label>Name</label><input type="text" name="name" value="{{ client.name if client else '' }}" required placeholder="Client name"></div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ client.email if client else '' }}" required placeholder="email@example.com"></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ client.phone if client else '' }}" placeholder="+1 555 000 0000"></div>
    </div>
    <div class="form-group"><label>Address</label><textarea name="address" placeholder="Street, City">{{ client.address if client else '' }}</textarea></div>
    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">{{ "Save" if client else "Add Client" }}</button>
      <a href="{{ url_for('clients') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
